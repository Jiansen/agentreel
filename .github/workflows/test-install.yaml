name: Test Install

on:
  push:
    branches: [main]
    paths: [install.sh]
  pull_request:
    branches: [main]
    paths: [install.sh]
  workflow_dispatch:

jobs:
  install-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run install.sh
        run: bash install.sh --no-desktop
        env:
          AGENTREEL_TELEMETRY: "off"

      - name: Verify CLI accessible
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agentreel help
          agentreel status

      - name: Verify symlink
        run: |
          ls -la /usr/local/bin/agentreel
          /usr/local/bin/agentreel help

      - name: Verify build artifacts
        run: |
          test -f "$HOME/.agentreel/.next/BUILD_ID"
          test -f "$HOME/.agentreel/server/relay_server.py"

  install-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run install.sh
        run: bash install.sh --no-desktop
        env:
          AGENTREEL_TELEMETRY: "off"

      - name: Verify CLI accessible
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agentreel help
          agentreel status

      - name: Verify build artifacts
        run: |
          test -f "$HOME/.agentreel/.next/BUILD_ID"
          test -f "$HOME/.agentreel/server/relay_server.py"

  install-linux-full:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run install.sh (full with desktop)
        run: bash install.sh
        env:
          AGENTREEL_TELEMETRY: "off"

      - name: Verify desktop components
        run: |
          which Xvfb
          which ffmpeg
          which xdotool
          which chromium-browser || which chromium || snap list chromium

      - name: Verify CLI and start
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agentreel help
          agentreel doctor || true
